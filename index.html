<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TV PRO MAX</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="playlist.js"></script>

    <style>
        :root { --yellow: #ffcc00; --focus-bg: rgba(255, 255, 255, 0.25); }
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; color: #fff;
            font-family: sans-serif; -webkit-tap-highlight-color: transparent;
        }

        /* CONTAINER ÉP NGANG TUYỆT ĐỐI - KHÔNG BỊ CO NHOỎ, KHÔNG BỊ CẮT BÊN */
        #rotation-wrapper {
            position: absolute;
            background: #000;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: block;
            overflow: hidden;
        }

        #video-viewport { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* INTERFACE OVERLAY */
        .controls-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.25);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s; z-index: 50;
        }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar {
            position: absolute; top: 0; left: 0;
            width: 140px; height: 100%;
            background: rgba(10,10,10,0.96);
            border-right: 1px solid #333;
            overflow-y: auto; overflow-x: hidden;
            transform: translateX(-100%);
            transition: transform 0.2s;
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }
        .controls-overlay.active .sidebar { transform: translateX(0); }

        .side-item {
            padding: 12px 8px; border-bottom: 1px solid #1a1a1a;
            text-align: center; opacity: 0.5;
            cursor: pointer; transition: 0.15s; outline: none;
            display: flex; align-items: center; justify-content: center;
            min-height: 50px;
        }
        .side-item.active { opacity: 1; border-left: 4px solid var(--yellow); background: rgba(255,204,0,0.12); }
        .side-item.focused { opacity: 1; background: var(--focus-bg); transform: scale(1.04); }
        .side-item img { max-width: 90%; max-height: 40px; object-fit: contain; pointer-events: none; }

        #stats {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); color: #00ff00;
            font-family: monospace; font-size: 11px;
            padding: 4px 8px; border-radius: 4px; pointer-events: none;
        }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: var(--yellow); font-weight: bold; font-size: 16px;
            z-index: 60; text-shadow: 0 0 10px #000; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="rotation-wrapper">
    <div id="video-viewport">
        <video id="main-video" autoplay playsinline webkit-playsinline></video>
        <div id="loading">ĐANG TẢI...</div>
        <div class="controls-overlay" id="ui-overlay">
            <div class="sidebar" id="sidebar-el"></div>
            <div id="stats">—</div>
        </div>
    </div>
</div>

<script>
const wrapper = document.getElementById('rotation-wrapper');

// Tự động tính toán kích thước bao phủ toàn màn hình khi xoay
function forceLandscape() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    if (w < h) {
        // Điện thoại màn hình dọc: đảo ngược chiều rộng thành chiều cao để bung hết cỡ 100% không bị sọc đen
        wrapper.style.width  = h + 'px';
        wrapper.style.height = w + 'px';
        wrapper.style.transform = 'translate(-50%, -50%) rotate(90deg)';
    } else {
        // Tivi hoặc điện thoại nằm ngang chuẩn bét màn hình
        wrapper.style.width  = '100%';
        wrapper.style.height = '100%';
        wrapper.style.transform = 'translate(-50%, -50%) rotate(0deg)';
    }
}

forceLandscape();
window.addEventListener('resize', forceLandscape);
window.addEventListener('orientationchange', forceLandscape);

// ── PLAYER LOGIC ────────────────────────────────────────────────────
const v       = document.getElementById('main-video');
const overlay = document.getElementById('ui-overlay');
const sidebar = document.getElementById('sidebar-el');
const loader  = document.getElementById('loading');
const statsEl = document.getElementById('stats');

let hls = new Hls({ manifestLoadingMaxRetry: 10 });
let channels = [], curIdx = 0, uiTimer = null;
let statsInterval = null, frameCount = 0, fps = 0, lastTs = 0;

(function fpsLoop() {
    if (!v.paused) { frameCount++; const now = performance.now();
    if (now - lastTs >= 1000) { fps = frameCount; frameCount = 0; lastTs = now; }
    } requestAnimationFrame(fpsLoop);
})();

function updateStats() {
    const level = hls.levels?.[hls.currentLevel] || {};
    const mbps  = level.bitrate ? (level.bitrate / 1e6).toFixed(1) + ' Mbps' : 'Auto';
    const res   = v.videoWidth ? `${v.videoWidth}×${v.videoHeight}` : '—';
    statsEl.innerText = `${res} | ${mbps} | ${fps} fps`;
}

// KHÔN NGOAN AUTOPLAY FIX - CHỈ BỊ TRÊN ĐIỆN THOẠI, TV KHÔNG BỊ ẢNH HƯỞNG
function playChannel(idx) {
    if (idx < 0 || idx >= channels.length) return;
    curIdx = idx; loader.style.display = 'block';
    
    // Check xem có phải là điện thoại lướt web ko
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    // Nếu là TV hoặc PC thì phát có tiếng luôn. Nếu là Mobile lướt Safari/Chrome thì mới tạm tắt tiếng để chạy
    v.muted = isMobile;

    document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
    const activeEl = sidebar.children[idx];
    if (activeEl) { 
        activeEl.classList.add('active'); 
        activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); 
    }

    if (Hls.isSupported()) {
        hls.detachMedia(); hls.loadSource(channels[idx].url); hls.attachMedia(v);
        hls.once(Hls.Events.MANIFEST_PARSED, () => {
            v.play().catch(() => {
                // Phương án dự phòng cuối nếu trình duyệt mobile quá gắt gao
                v.muted = true; v.play();
            });
        });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
        v.src = channels[idx].url; 
        v.play().catch(() => {
            v.muted = true; v.play();
        });
    }
}

v.addEventListener('playing', () => loader.style.display = 'none');

function showUI() {
    overlay.classList.add('active'); setFocus(curIdx); updateStats();
    if (!statsInterval) statsInterval = setInterval(updateStats, 1000); resetHideTimer();
}
function hideUI() { overlay.classList.remove('active'); clearFocus();
clearTimeout(uiTimer); clearInterval(statsInterval); statsInterval = null; }
function resetHideTimer() { clearTimeout(uiTimer); uiTimer = setTimeout(hideUI, 3000); }
function setFocus(idx) { document.querySelectorAll('.side-item').forEach(el => el.classList.remove('focused'));
const el = sidebar.children[idx]; if (el) { el.classList.add('focused'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } }
function clearFocus() { document.querySelectorAll('.side-item').forEach(el => el.classList.remove('focused')); }

// Người dùng chạm màn hình điện thoại tự mở tiếng (unmute) và hiện UI
document.getElementById('video-viewport').addEventListener('click', (e) => {
    if (v.muted) v.muted = false; 
    if (overlay.contains(e.target) && e.target !== overlay) return;
    overlay.classList.contains('active') ? hideUI() : showUI();
});

// REMOTE TV COMDETE FIX - BAO QUÁT 100% CÁC LOẠI PHÍM REMOTE TV
document.addEventListener('keydown', (e) => {
    if (v.muted) v.muted = false; 
    const KEYS = { UP: 38, DOWN: 40, LEFT: 37, RIGHT: 39, OK: 13, BACK: [8, 10009, 461, 27], MENU: [18, 93, 10134, 10140], SELECT: 23 };
    const n = channels.length;
    let handled = false;

    if (e.keyCode === KEYS.OK || e.keyCode === KEYS.SELECT) {
        if (!overlay.classList.contains('active')) showUI();
        else { playChannel(curIdx); hideUI(); }
        handled = true;
    } else if (KEYS.MENU.includes(e.keyCode) || e.keyCode === KEYS.RIGHT) {
        overlay.classList.contains('active') ? hideUI() : showUI();
        handled = true;
    } else if (KEYS.BACK.includes(e.keyCode)) {
        if (overlay.classList.contains('active')) { hideUI(); handled = true; }
    }

    if (overlay.classList.contains('active')) {
        resetHideTimer();
        if (e.keyCode === KEYS.DOWN) { curIdx = (curIdx + 1) % n; setFocus(curIdx); handled = true; }
        else if (e.keyCode === KEYS.UP) { curIdx = (curIdx - 1 + n) % n; setFocus(curIdx); handled = true; }
        else if (e.keyCode === KEYS.LEFT) { hideUI(); handled = true; }
    } else {
        if (e.keyCode === KEYS.DOWN || e.keyCode === KEYS.UP) { showUI(); handled = true; }
    }
    if (handled) e.preventDefault();
});

async function init() {
    try {
        let raw = Object.values(playlistData).flat();
        const thvl1 = raw.find(c => c.short === 'THVL1');
        channels = thvl1 ? [thvl1, ...raw.filter(c => c.short !== 'THVL1')] : raw;

        channels.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = 'side-item';
            el.innerHTML = `<img src="${c.logo}" loading="lazy" title="${c.name}">`;
            el.addEventListener('click', (e) => { e.stopPropagation(); playChannel(i); hideUI(); });
            sidebar.appendChild(el);
        });

        const vtv1Idx = channels.findIndex(c => c.short === 'VTV1');
        playChannel(vtv1Idx >= 0 ? vtv1Idx : 0);

        forceLandscape();
    } catch (err) { loader.style.display = 'block'; loader.innerText = 'LỖI DANH SÁCH'; }
}

init();
</script>
</body>
</html>
